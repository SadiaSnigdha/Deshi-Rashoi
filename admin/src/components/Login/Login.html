<!-- Admin Login Component -->
<div class="login-popup">
    <form id="admin-login-form" class="login-popup-container">
        <div class="login-popup-title">
            <h2>Admin Login</h2>
        </div>
        <div class="login-popup-inputs">
            <div class="input-group">
                <label for="admin-email">Your email</label>
                <input id="admin-email" name="email" type="email" placeholder="Enter your email" required>
            </div>
            <div class="input-group">
                <label for="admin-password">Your password</label>
                <input id="admin-password" name="password" type="password" placeholder="Enter your password" required>
            </div>
        </div>
        <button type="submit" class="login-btn">Login</button>
    </form>
</div>
