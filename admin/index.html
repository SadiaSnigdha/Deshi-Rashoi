<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food-Del Admin</title>
    <link rel="stylesheet" href="src/index.css">
    <link rel="stylesheet" href="src/components/Navbar/Navbar.css">
    <link rel="stylesheet" href="src/components/Sidebar/Sidebar.css">
    <link rel="stylesheet" href="src/components/Login/Login.css">
    <link rel="stylesheet" href="src/pages/Add/Add.css">
    <link rel="stylesheet" href="src/pages/List/List.css">
    <link rel="stylesheet" href="src/pages/Orders/Orders.css">
    <link rel="stylesheet" href="js/toast.css">
</head>
<body>
    <div id="root">
        <!-- Navbar -->
        <nav class="navbar">
            <div class="navbar-brand">
                <img src="src/assets/logo.png" alt="Logo" class="logo">
                <span class="brand-name">Deshi Rashoi</span>
            </div>
            <p class="navbar-title">Admin Panel</p>
        </nav>

        <div class="app-content">
            <!-- Sidebar -->
            <div id="sidebar" class="sidebar">
                <ul class="sidebar-menu">
                    <li data-page="add" class="add-link">
                        <img src="src/assets/add_icon.png" alt="Add">
                        <span>Add Items</span>
                    </li>
                    <li data-page="list" class="list-link">
                        <img src="src/assets/order_icon.png" alt="List">
                        <span>List Items</span>
                    </li>
                    <li data-page="orders" class="orders-link">
                        <img src="src/assets/order_icon.png" alt="Orders">
                        <span>Orders</span>
                    </li>
                </ul>
            </div>

            <!-- Main Content -->
            <div id="page-container" class="main-content"></div>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="toast-container"></div>

    <!-- Scripts -->
    <script src="js/api.js"></script>
    <script src="js/store.js"></script>
    <script src="js/toast.js"></script>
    <script src="js/pages.js"></script>
    <script src="js/router.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
